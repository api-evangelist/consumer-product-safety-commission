      - name: SLA Targets
      - name: Webhook Subscriptions
      - name: CPSC Recalls API
      - name: SaferProducts.gov OData API
  - id: consumer-product-safety-commission-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Consumer Product Safety Commission. Includes dedicated capacity,
      contractual SLAs, security review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://www.saferproducts.gov/RestWebServices
          - https://www.saferproducts.gov/WebApi/Cpsc.Cpsrms.Web.Api.svc
