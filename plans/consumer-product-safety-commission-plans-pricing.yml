        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://www.saferproducts.gov/RestWebServices
          - https://www.saferproducts.gov/WebApi/Cpsc.Cpsrms.Web.Api.svc
        unit: 1000
