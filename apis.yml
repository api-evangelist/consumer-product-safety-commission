description: >-
  The Consumer Product Safety Commission (CPSC) is a government agency responsible
  for protecting the public from unreasonable risks of injury or death associated
  with consumer products. The CPSC oversees the safety of a wide range of products,
  including toys, household items, electronics, and furniture. The agency works to
  develop safety standards for products, conducts research on potential hazards, and
  investigates consumer complaints and reports of injuries related to products.
